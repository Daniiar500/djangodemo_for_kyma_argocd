apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: django-demo
  template:
    metadata:
      labels:
        app: django-demo
    spec:
      containers:
        - name: django-demo
          image: ghcr.io/daniiar500/djangodemo_for_kyma_argocd:latest
          ports:
            - containerPort: 8000