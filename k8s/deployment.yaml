apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-demo
  namespace: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: django-demo
  template:
    metadata:
      labels:
        app: django-demo
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: django-demo
          image: ghcr.io/daniiar500/djangodemo_for_kyma_argocd:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000